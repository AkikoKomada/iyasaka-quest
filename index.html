<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>異矢世界QUEST 〜 異矢世界（いやさかい）講演会への道 〜</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }
    body {
      min-height: 100%;
      height: 100svh;
      overflow: hidden;
      touch-action: manipulation;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding:
        max(4px, env(safe-area-inset-top))
        max(4px, env(safe-area-inset-right))
        max(4px, env(safe-area-inset-bottom))
        max(4px, env(safe-area-inset-left));
      background: #000;
      color: #8898b8;
      font-family: "Courier New", Courier, monospace;
    }
    #shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100%;
      gap: 6px;
      overflow: hidden;
    }
    h1 {
      flex-shrink: 0;
      font-size: clamp(9px, 2.8vw, 12px);
      font-weight: normal;
      letter-spacing: 0.12em;
      color: #506080;
      text-align: center;
      line-height: 1.3;
      padding: 4px 8px 0;
    }
    #play-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex: 1;
      min-height: 0;
      width: 100%;
      padding: 0 8px;
    }
    #frame {
      position: relative;
      flex: 0 1 auto;
      width: min(768px, calc(100vw - 32px));
      max-width: 100%;
      aspect-ratio: 4 / 3;
      max-height: min(576px, calc(100svh - 220px));
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      box-shadow: 0 0 0 4px #2040a0, 0 0 0 8px #000, 0 12px 40px rgba(0,0,0,0.6);
      outline: none;
    }
    #game {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
      cursor: default;
      outline: none;
      touch-action: none;
    }
    #msg {
      position: absolute;
      left: 2%;
      right: 2%;
      bottom: 2%;
      min-height: 15%;
      padding: 2% 2.5% 6%;
      background: #102848;
      border: 3px solid #fff;
      color: #fff;
      font-size: clamp(12px, 2.2vw, 20px);
      line-height: 1.55;
      display: none;
      z-index: 5;
    }
    #msg.open { display: flex; gap: 12px; align-items: flex-start; }
    #msg-body { flex: 1; min-width: 0; }
    #msg-video {
      display: none;
      width: min(128px, 28%);
      height: auto;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #fff;
      flex-shrink: 0;
    }
    #msg.has-video #msg-video { display: block; }
    #msg-name {
      color: #f8d830;
      font-size: 14px;
      margin-bottom: 4px;
    }
    #msg-cursor {
      position: absolute;
      right: 12px;
      bottom: 6px;
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    #hint {
      flex: 1 1 auto;
      font-size: clamp(10px, 2.8vw, 12px);
      color: #90a8c8;
      text-align: center;
      line-height: 1.5;
      padding: 0;
      min-width: 0;
    }
    #bottom-bar {
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px 12px;
      width: 100%;
      max-width: min(768px, 100%);
      padding: 0 12px 6px;
    }
    /* タッチ操作 — ゲームの下に常時表示（スマホ） */
    #touch-controls {
      display: none;
      flex-shrink: 0;
      width: 180px;
      height: 180px;
      touch-action: none;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 8px;
    }
    #touch-controls button {
      border: 3px solid #fff;
      border-radius: 12px;
      background: #2040a0;
      color: #fff;
      font-size: 28px;
      font-weight: bold;
      line-height: 1;
      min-width: 52px;
      min-height: 52px;
      padding: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: none;
      box-shadow: 0 2px 0 #102848;
    }
    #touch-controls button.pressed {
      background: #4080ff;
      transform: translateY(2px);
      box-shadow: none;
    }
    #touch-controls .spacer {
      visibility: hidden;
      pointer-events: none;
    }
    /* スマホ・タブレット：矢印を必ず表示 */
    @media (max-width: 900px), (hover: none) and (pointer: coarse) {
      #touch-controls {
        display: grid !important;
      }
      #frame {
        max-height: calc(100svh - 280px);
        width: min(calc(100vw - 32px), calc((100svh - 280px) * 4 / 3));
      }
      #hint {
        color: #b0c8e8;
      }
    }
    /* 横画面 */
    @media (orientation: landscape) and (max-height: 520px) {
      #play-area {
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }
      h1 { font-size: 9px; padding: 2px 8px 0; }
      #hint { font-size: 9px; }
      #bottom-bar { padding-bottom: 4px; }
      #frame {
        order: 1;
        max-height: calc(100svh - 56px);
        width: min(calc((100svh - 56px) * 4 / 3), calc(100vw - 200px));
      }
      #touch-controls {
        order: 2;
        width: 140px;
        height: 140px;
      }
      #touch-controls button {
        font-size: 20px;
        min-width: 42px;
        min-height: 42px;
      }
    }
    #kb {
      position: absolute;
      left: 0;
      top: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      padding: 0;
      border: none;
      outline: none;
      background: transparent;
      z-index: 2;
      caret-color: transparent;
    }
    /* 会話・タイトル中：画面いっぱいタップでつぎへ */
    #tap-advance {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
      background: transparent;
    }
    body.is-menu #tap-advance {
      display: block;
    }
    body.is-menu #touch-controls {
      display: none !important;
    }
    #opening-skip {
      display: none;
      position: absolute;
      right: 8px;
      bottom: 8px;
      z-index: 6;
      border: 2px solid #8090b8;
      border-radius: 6px;
      background: rgba(0, 0, 24, 0.75);
      color: #c0d0e8;
      font-family: "Courier New", Courier, monospace;
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
    }
    body.is-opening #opening-skip {
      display: block;
      z-index: 60;
    }
    #bgm-toggle {
      flex-shrink: 0;
      border: 2px solid #8090b8;
      border-radius: 6px;
      background: rgba(0, 0, 24, 0.75);
      color: #c0d0e8;
      font-family: "Courier New", Courier, monospace;
      font-size: 11px;
      padding: 4px 8px;
      cursor: pointer;
      line-height: 1.2;
    }
    #bgm-toggle[aria-pressed="false"] {
      color: #8090a8;
    }
    /* PC版 — 文字を大きく */
    @media (min-width: 901px) and (hover: hover) {
      h1 {
        font-size: 14px;
        color: #6880a0;
      }
      #msg {
        font-size: 24px;
        line-height: 1.6;
        padding: 3% 3% 7%;
      }
      #msg-name {
        font-size: 18px;
        margin-bottom: 8px;
      }
      #msg-cursor {
        font-size: 18px;
        right: 16px;
        bottom: 10px;
      }
      #msg-video {
        width: min(160px, 30%);
      }
      #hint {
        font-size: 15px;
        color: #b0c8e8;
      }
    }
  </style>
</head>
<body>
  <script>
    if (navigator.maxTouchPoints > 0 || /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      document.body.classList.add('is-touch');
    }
  </script>
  <div id="shell">
    <div id="tap-advance" aria-label="タップでつぎへ"></div>
    <h1>異矢世界QUEST 〜 異矢世界（いやさかい）講演会への道 〜</h1>
    <div id="play-area">
      <div id="frame">
        <input id="kb" type="text" readonly autofocus autocomplete="off" spellcheck="false" inputmode="none" aria-hidden="true" tabindex="0">
        <canvas id="game"></canvas>
        <div id="msg">
          <div id="msg-body">
            <div id="msg-name"></div>
            <div id="msg-text"></div>
          </div>
          <img id="msg-video" src="assets/items/iyasaka-video.jpg" alt="">
          <span id="msg-cursor">▼</span>
        </div>
        <button type="button" id="opening-skip" aria-label="オープニングをスキップ">Skip</button>
      </div>
      <div id="touch-controls" aria-label="方向ボタン">
        <span class="spacer"></span>
        <button type="button" data-dir="up" aria-label="上">↑</button>
        <span class="spacer"></span>
        <button type="button" data-dir="left" aria-label="左">←</button>
        <span class="spacer"></span>
        <button type="button" data-dir="right" aria-label="右">→</button>
        <span class="spacer"></span>
        <button type="button" data-dir="down" aria-label="下">↓</button>
        <span class="spacer"></span>
      </div>
    </div>
    <div id="bottom-bar">
      <p id="hint">読み込み中…</p>
      <button type="button" id="bgm-toggle" aria-label="BGM切り替え" aria-pressed="true">🎵 ON</button>
    </div>
  </div>
  <script type="module" src="js/main.js?v=20250623h"></script>
</body>
</html>
