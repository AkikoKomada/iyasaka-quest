<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>いやさかQUEST — コーちゃん完全自由版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
    }
    body {
      min-height: 100%;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(4px, 1.2vh, 10px);
      padding:
        max(6px, env(safe-area-inset-top))
        max(6px, env(safe-area-inset-right))
        max(6px, env(safe-area-inset-bottom))
        max(6px, env(safe-area-inset-left));
      background: #000;
      color: #8898b8;
      font-family: "Courier New", Courier, monospace;
    }
    #shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 100%;
      height: 100%;
      gap: clamp(4px, 1.2vh, 10px);
      overflow: hidden;
    }
    h1 {
      flex-shrink: 0;
      font-size: clamp(9px, 2.8vw, 12px);
      font-weight: normal;
      letter-spacing: 0.12em;
      color: #506080;
      text-align: center;
      line-height: 1.3;
      padding: 0 8px;
    }
    #frame {
      position: relative;
      flex-shrink: 1;
      width: min(768px, calc(100vw - 16px), calc((100dvh - 72px) * 4 / 3));
      max-width: 100%;
      aspect-ratio: 4 / 3;
      height: auto;
      max-height: calc(100dvh - 72px);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      box-shadow: 0 0 0 4px #2040a0, 0 0 0 8px #000, 0 12px 40px rgba(0,0,0,0.6);
      outline: none;
    }
    #game {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
      cursor: default;
      outline: none;
    }
    #msg {
      position: absolute;
      left: 2%;
      right: 2%;
      bottom: 2%;
      min-height: 15%;
      padding: 2% 2.5% 6%;
      background: #102848;
      border: 3px solid #fff;
      color: #fff;
      font-size: clamp(12px, 2.2vw, 17px);
      line-height: 1.5;
      display: none;
    }
    #msg.open { display: flex; gap: 12px; align-items: flex-start; }
    #msg-body { flex: 1; min-width: 0; }
    #msg-video {
      display: none;
      width: min(128px, 28%);
      height: auto;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #fff;
      flex-shrink: 0;
    }
    #msg.has-video #msg-video { display: block; }
    #msg-name {
      color: #f8d830;
      font-size: 14px;
      margin-bottom: 4px;
    }
    #msg-cursor {
      position: absolute;
      right: 12px;
      bottom: 6px;
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    #hint {
      flex-shrink: 0;
      font-size: clamp(9px, 2.6vw, 11px);
      color: #405060;
      max-width: min(768px, 100%);
      text-align: center;
      line-height: 1.4;
      padding: 0 8px;
    }
    #touch-controls {
      display: none;
      position: absolute;
      left: 8px;
      bottom: 8px;
      width: 132px;
      height: 132px;
      z-index: 3;
      touch-action: none;
      pointer-events: none;
    }
    #touch-controls.visible {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 4px;
      pointer-events: auto;
    }
    #touch-controls button {
      border: 2px solid rgba(255,255,255,0.55);
      border-radius: 8px;
      background: rgba(16, 40, 72, 0.72);
      color: #fff;
      font-size: 20px;
      line-height: 1;
      padding: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    #touch-controls button:active {
      background: rgba(32, 64, 160, 0.9);
    }
    #touch-controls .spacer { visibility: hidden; pointer-events: none; border: none; background: transparent; }
    @media (orientation: landscape) and (max-height: 520px) {
      h1 { font-size: 9px; }
      #hint { font-size: 9px; }
      #frame {
        width: min(768px, calc(100vw - 16px), calc((100dvh - 48px) * 4 / 3));
        max-height: calc(100dvh - 48px);
      }
      #touch-controls {
        width: 108px;
        height: 108px;
        left: max(8px, env(safe-area-inset-left));
        bottom: max(8px, env(safe-area-inset-bottom));
      }
      #touch-controls button { font-size: 16px; }
    }
    #kb {
      position: absolute;
      left: 0;
      top: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      padding: 0;
      border: none;
      outline: none;
      background: transparent;
      z-index: 2;
      caret-color: transparent;
    }
  </style>
</head>
<body>
  <div id="shell">
    <h1>いやさかQUEST — Phase 2（3人パーティ）</h1>
    <div id="frame">
      <input id="kb" type="text" readonly autofocus autocomplete="off" spellcheck="false" inputmode="none" aria-hidden="true" tabindex="0">
      <canvas id="game"></canvas>
      <div id="touch-controls" aria-hidden="true">
        <span class="spacer"></span>
        <button type="button" data-dir="up" aria-label="上">↑</button>
        <span class="spacer"></span>
        <button type="button" data-dir="left" aria-label="左">←</button>
        <span class="spacer"></span>
        <button type="button" data-dir="right" aria-label="右">→</button>
        <span class="spacer"></span>
        <button type="button" data-dir="down" aria-label="下">↓</button>
        <span class="spacer"></span>
      </div>
      <div id="msg">
        <div id="msg-body">
          <div id="msg-name"></div>
          <div id="msg-text"></div>
        </div>
        <img id="msg-video" src="assets/items/iyasaka-video.jpg" alt="">
        <span id="msg-cursor">▼</span>
      </div>
    </div>
    <p id="hint">読み込み中…</p>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
