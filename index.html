<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>いやさかQUEST — コーちゃん完全自由版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
    }
    body {
      min-height: 100%;
      height: 100svh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding:
        max(4px, env(safe-area-inset-top))
        max(4px, env(safe-area-inset-right))
        max(4px, env(safe-area-inset-bottom))
        max(4px, env(safe-area-inset-left));
      background: #000;
      color: #8898b8;
      font-family: "Courier New", Courier, monospace;
    }
    #shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      gap: 6px;
      overflow: hidden;
    }
    h1 {
      flex-shrink: 0;
      font-size: clamp(9px, 2.8vw, 12px);
      font-weight: normal;
      letter-spacing: 0.12em;
      color: #506080;
      text-align: center;
      line-height: 1.3;
      padding: 0 8px;
    }
    #play-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex: 1;
      min-height: 0;
      width: 100%;
    }
    #frame {
      position: relative;
      flex-shrink: 1;
      width: var(--game-w, min(768px, 100vw - 16px));
      height: var(--game-h, auto);
      max-width: 100%;
      max-height: 100%;
      aspect-ratio: 4 / 3;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      box-shadow: 0 0 0 4px #2040a0, 0 0 0 8px #000, 0 12px 40px rgba(0,0,0,0.6);
      outline: none;
    }
    #game {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
      cursor: default;
      outline: none;
      touch-action: none;
    }
    #msg {
      position: absolute;
      left: 2%;
      right: 2%;
      bottom: 2%;
      min-height: 15%;
      padding: 2% 2.5% 6%;
      background: #102848;
      border: 3px solid #fff;
      color: #fff;
      font-size: clamp(12px, 2.2vw, 17px);
      line-height: 1.5;
      display: none;
      z-index: 5;
    }
    #msg.open { display: flex; gap: 12px; align-items: flex-start; }
    #msg-body { flex: 1; min-width: 0; }
    #msg-video {
      display: none;
      width: min(128px, 28%);
      height: auto;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #fff;
      flex-shrink: 0;
    }
    #msg.has-video #msg-video { display: block; }
    #msg-name {
      color: #f8d830;
      font-size: 14px;
      margin-bottom: 4px;
    }
    #msg-cursor {
      position: absolute;
      right: 12px;
      bottom: 6px;
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    #hint {
      flex-shrink: 0;
      font-size: clamp(9px, 2.6vw, 11px);
      color: #405060;
      max-width: min(768px, 100%);
      text-align: center;
      line-height: 1.4;
      padding: 0 8px;
    }
    /* タッチ操作 — ゲーム画面の下（重ならない） */
    #touch-controls {
      display: none;
      flex-shrink: 0;
      width: 168px;
      height: 168px;
      touch-action: none;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 6px;
    }
    body.is-touch.is-playing #touch-controls {
      display: grid;
    }
    #touch-controls button {
      border: 2px solid rgba(255,255,255,0.7);
      border-radius: 10px;
      background: rgba(16, 40, 72, 0.92);
      color: #fff;
      font-size: 24px;
      line-height: 1;
      min-width: 48px;
      min-height: 48px;
      padding: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: none;
    }
    #touch-controls button.pressed {
      background: rgba(48, 96, 200, 0.95);
      border-color: #fff;
    }
    #touch-controls .spacer {
      visibility: hidden;
      pointer-events: none;
    }
    /* 横画面：ゲーム左・矢印右 */
    @media (orientation: landscape) {
      body.is-touch #play-area {
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }
      body.is-touch h1,
      body.is-touch #hint {
        font-size: 9px;
      }
      body.is-touch #touch-controls {
        width: 132px;
        height: 132px;
        order: 2;
      }
      body.is-touch #frame {
        order: 1;
      }
      body.is-touch #touch-controls button {
        font-size: 18px;
        min-width: 40px;
        min-height: 40px;
      }
    }
    #kb {
      position: absolute;
      left: 0;
      top: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      padding: 0;
      border: none;
      outline: none;
      background: transparent;
      z-index: 2;
      caret-color: transparent;
    }
  </style>
</head>
<body>
  <div id="shell">
    <h1>いやさかQUEST — Phase 2（3人パーティ）</h1>
    <div id="play-area">
      <div id="frame">
        <input id="kb" type="text" readonly autofocus autocomplete="off" spellcheck="false" inputmode="none" aria-hidden="true" tabindex="0">
        <canvas id="game"></canvas>
        <div id="msg">
          <div id="msg-body">
            <div id="msg-name"></div>
            <div id="msg-text"></div>
          </div>
          <img id="msg-video" src="assets/items/iyasaka-video.jpg" alt="">
          <span id="msg-cursor">▼</span>
        </div>
      </div>
      <div id="touch-controls" aria-hidden="true">
        <span class="spacer"></span>
        <button type="button" data-dir="up" aria-label="上">↑</button>
        <span class="spacer"></span>
        <button type="button" data-dir="left" aria-label="左">←</button>
        <span class="spacer"></span>
        <button type="button" data-dir="right" aria-label="右">→</button>
        <span class="spacer"></span>
        <button type="button" data-dir="down" aria-label="下">↓</button>
        <span class="spacer"></span>
      </div>
    </div>
    <p id="hint">読み込み中…</p>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
